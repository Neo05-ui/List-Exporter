<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>List Exporter</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#050a05;--surf:#080e08;
      --green:#00ff41;--amber:#ffb000;--cyan:#00f0ff;--pink:#ff2d78;--grey:#c0c0c0;
      --muted:rgba(0,255,65,0.45);--border:rgba(0,255,65,0.2);--border2:rgba(0,255,65,0.4);
    }
    body{
      width:400px;min-height:540px;
      background:var(--bg);color:var(--green);
      font-family:'Courier New',Courier,monospace;font-size:13px;
      overflow-x:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);
    }
    .hdr{
      background:#000;padding:10px 14px;
      border-bottom:2px solid var(--border2);
      display:flex;align-items:center;justify-content:space-between;
    }
    .logo-text{font-size:15px;font-weight:bold;letter-spacing:0.12em;color:var(--green);text-shadow:0 0 8px rgba(0,255,65,0.5)}
    .logo-sub{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:0.08em}
    .settings-btn{
      background:transparent;border:1px solid var(--border2);
      color:var(--muted);font-size:14px;width:26px;height:26px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;
    }
    .settings-btn:hover{border-color:var(--green);color:var(--green)}
    .content{padding:12px 14px}
    .slbl{
      font-size:9px;letter-spacing:0.18em;text-transform:uppercase;
      color:var(--cyan);margin-bottom:8px;
      display:flex;align-items:center;gap:8px;
    }
    .slbl::before{content:'>';color:var(--green)}
    .slbl::after{content:'';flex:1;height:1px;background:rgba(0,240,255,0.2)}
    .plat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
    .plat-btn{
      background:#000;
      border-top:2px solid var(--border2);border-left:2px solid var(--border2);
      border-right:2px solid rgba(0,0,0,0.8);border-bottom:2px solid rgba(0,0,0,0.8);
      padding:10px 4px 8px;cursor:pointer;text-align:center;
      display:flex;flex-direction:column;align-items:center;gap:4px;
      box-shadow:2px 2px 0 rgba(0,0,0,0.7);transition:all 0.1s;
    }
    .plat-btn:hover{background:rgba(0,255,65,0.07)}
    .plat-btn.active{
      background:rgba(0,255,65,0.1);
      border-top:2px solid rgba(0,0,0,0.5);border-left:2px solid rgba(0,0,0,0.5);
      border-right:2px solid var(--border2);border-bottom:2px solid var(--border2);
      box-shadow:inset 1px 1px 0 rgba(0,0,0,0.8);
    }
    .plat-btn.disabled{opacity:0.35;cursor:default;pointer-events:none}
    .p-ico{font-size:9px;font-weight:bold;letter-spacing:0.05em;color:var(--amber)}
    .plat-btn.active .p-ico{color:var(--green);text-shadow:0 0 6px rgba(0,255,65,0.6)}
    .p-name{font-size:10px;color:var(--muted)}
    .plat-btn.active .p-name{color:var(--green)}
    .inst{
      background:#000;border:1px solid rgba(0,255,65,0.15);
      padding:8px 10px;font-size:11px;color:var(--muted);
      line-height:1.6;margin-bottom:10px;display:none;
    }
    .inst.on{display:block}
    .inst b{color:var(--green)}
    .scan-btn{
      width:100%;background:var(--green);border:none;
      color:#000;font-family:'Courier New',monospace;font-weight:bold;
      font-size:11px;letter-spacing:0.12em;
      padding:10px;cursor:pointer;
      box-shadow:3px 3px 0 #005a1a;
      transition:transform 0.1s,box-shadow 0.1s;
      margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .scan-btn:hover{transform:translate(1px,1px);box-shadow:2px 2px 0 #005a1a}
    .scan-btn:active{transform:translate(3px,3px);box-shadow:none}
    .scan-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none !important;box-shadow:3px 3px 0 #005a1a !important}
    .load{display:none;margin-bottom:10px}
    .load.on{display:block}
    .load-track{height:2px;background:var(--border);margin-bottom:5px}
    .load-fill{height:100%;background:var(--green);width:0%;transition:width 0.35s;box-shadow:0 0 6px var(--green)}
    .load-msg{font-size:11px;color:var(--muted)}
    .load-msg::before{content:'> '}
    .err-box{
      font-size:11px;color:var(--pink);
      padding:7px 10px;border:1px solid rgba(255,45,120,0.35);
      background:rgba(255,45,120,0.06);margin-bottom:10px;display:none;line-height:1.5;
    }
    .err-box::before{content:'[ERR] '}
    .err-box.on{display:block}
    .results{display:none}
    .results.on{display:block}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
    .stat{
      background:#000;
      border-top:2px solid var(--border2);border-left:2px solid var(--border2);
      border-right:2px solid rgba(0,0,0,0.8);border-bottom:2px solid rgba(0,0,0,0.8);
      padding:8px 6px;text-align:center;box-shadow:2px 2px 0 rgba(0,0,0,0.7);
    }
    .stat-n{font-size:20px;font-weight:bold;margin-bottom:3px}
    .stat-n.w{color:var(--green);text-shadow:0 0 8px rgba(0,255,65,0.5)}
    .stat-n.p{color:var(--amber);text-shadow:0 0 8px rgba(255,176,0,0.4)}
    .stat-n.c{color:var(--cyan);text-shadow:0 0 8px rgba(0,240,255,0.4)}
    .stat-l{font-size:9px;color:var(--muted);letter-spacing:0.1em}
    .list-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .tabs{display:flex;border:1px solid var(--border2)}
    .tab{
      font-size:9px;font-weight:bold;letter-spacing:0.08em;
      padding:4px 10px;cursor:pointer;color:var(--muted);
      background:transparent;border:none;transition:all 0.1s;
    }
    .tab.active{background:rgba(0,255,65,0.12);color:var(--green)}
    .tab:not(.active):hover{color:var(--amber)}
    .anime-list{max-height:130px;overflow-y:auto;margin-bottom:10px}
    .anime-list::-webkit-scrollbar{width:3px}
    .anime-list::-webkit-scrollbar-thumb{background:var(--green)}
    .a-row{display:flex;align-items:center;gap:7px;padding:4px 6px;transition:background 0.1s}
    .a-row:hover{background:rgba(0,255,65,0.05)}
    .a-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
    .a-title{flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--green)}
    .a-meta{font-size:10px;color:var(--muted);flex-shrink:0}
    .empty{text-align:center;padding:16px;font-size:11px;color:var(--muted)}
    .empty::before{content:'> '}
    .exp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
    .exp-btn{
      background:#000;
      border-top:2px solid var(--border2);border-left:2px solid var(--border2);
      border-right:2px solid rgba(0,0,0,0.8);border-bottom:2px solid rgba(0,0,0,0.8);
      padding:9px 4px;cursor:pointer;text-align:center;
      display:flex;flex-direction:column;align-items:center;gap:4px;
      box-shadow:2px 2px 0 rgba(0,0,0,0.7);transition:all 0.1s;
    }
    .exp-btn:hover{background:rgba(0,255,65,0.08)}
    .exp-btn:active{transform:translate(2px,2px);box-shadow:none}
    .e-ico{font-size:9px;font-weight:bold;color:var(--amber);letter-spacing:0.05em}
    .e-lbl{font-size:10px;color:var(--muted)}
    .ftr{
      padding:8px 14px;border-top:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;background:#000;
    }
    .ftr-txt{font-size:10px;color:var(--muted)}
    .ftr-txt::before{content:'// '}
    .clear-btn{font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'Courier New',monospace;transition:color 0.15s}
    .clear-btn:hover{color:var(--pink)}
    .settings-panel{display:none;padding:12px 14px}
    .settings-panel.on{display:block}
    .s-lbl{font-size:10px;color:var(--muted);margin-bottom:4px;margin-top:8px;display:block;letter-spacing:0.05em}
    .s-inp{
      width:100%;background:#000;border:1px solid var(--border2);
      color:var(--green);font-family:'Courier New',monospace;font-size:12px;
      padding:7px 10px;outline:none;caret-color:var(--green);
    }
    .s-inp:focus{border-color:var(--green)}
    .save-btn{
      width:100%;margin-top:10px;background:transparent;
      border:1px solid var(--green);color:var(--green);
      font-family:'Courier New',monospace;font-size:11px;font-weight:bold;
      letter-spacing:0.1em;padding:8px;cursor:pointer;transition:all 0.15s;
    }
    .save-btn:hover{background:rgba(0,255,65,0.1)}
    .modal-bg{
      display:none;position:fixed;inset:0;background:rgba(0,10,0,0.88);
      align-items:center;justify-content:center;z-index:200;padding:16px;
    }
    .modal-bg.on{display:flex}
    .modal-win{
      background:var(--grey);width:100%;max-width:360px;
      border-top:2px solid #fff;border-left:2px solid #fff;
      border-right:2px solid #555;border-bottom:2px solid #555;
      box-shadow:4px 4px 0 #000;
    }
    .win-bar{
      background:linear-gradient(90deg,#000080,#1084d0);
      color:#fff;font-size:9px;font-weight:bold;letter-spacing:0.05em;
      padding:5px 8px;display:flex;justify-content:space-between;align-items:center;
    }
    .win-x{
      width:16px;height:14px;background:var(--grey);
      border-top:1px solid #fff;border-left:1px solid #fff;
      border-right:1px solid #555;border-bottom:1px solid #555;
      font-size:11px;line-height:13px;text-align:center;
      color:#000;font-family:Arial;font-weight:bold;cursor:pointer;display:inline-block;
    }
    .win-body{padding:14px 16px;color:#000;font-family:'Courier New',monospace;font-size:12px}
    .win-sub{font-size:11px;color:#444;line-height:1.6;margin-bottom:10px}
    .win-sub a{color:#000080}
    .win-lbl{display:block;font-size:9px;font-weight:bold;color:#000080;margin-bottom:3px;margin-top:8px;letter-spacing:0.05em}
    .win-inp{
      width:100%;background:#fff;
      border-top:2px solid #555;border-left:2px solid #555;
      border-right:2px solid #fff;border-bottom:2px solid #fff;
      font-family:'Courier New',monospace;font-size:12px;
      padding:5px 7px;outline:none;color:#000;
    }
    .win-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
    .win-btn{
      background:var(--grey);color:#000;
      border-top:2px solid #fff;border-left:2px solid #fff;
      border-right:2px solid #555;border-bottom:2px solid #555;
      font-family:'Courier New',monospace;font-size:10px;font-weight:bold;
      letter-spacing:0.05em;padding:6px 14px;cursor:pointer;box-shadow:1px 1px 0 #000;
    }
    .win-btn:active{border-top-color:#555;border-left-color:#555;border-right-color:#fff;border-bottom-color:#fff;transform:translate(1px,1px);box-shadow:none}
    .win-btn.ok{background:var(--green);color:#000;border-right-color:#005a1a;border-bottom-color:#005a1a}
    .toast{
      position:fixed;bottom:12px;right:12px;z-index:500;
      background:#000;border:2px solid var(--green);
      color:var(--green);font-size:10px;font-weight:bold;letter-spacing:0.05em;
      padding:8px 14px;box-shadow:3px 3px 0 #005a1a;
      opacity:0;transform:translateY(8px);transition:all 0.2s;pointer-events:none;
    }
    .toast::before{content:'> '}
    .toast.on{opacity:1;transform:translateY(0)}
  </style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="logo-text">LIST.EXPORTER</div>
    <div class="logo-sub">WATCHLIST EXTRACTOR v2.2</div>
  </div>
  <button class="settings-btn" id="btn-settings">⚙</button>
</div>

<div class="settings-panel" id="settings-panel">
  <div class="slbl">Notion Config</div>
  <span class="s-lbl">INTEGRATION TOKEN</span>
  <input class="s-inp" type="password" id="saved-token" placeholder="secret_xxxxxxxxxxxx" />
  <span class="s-lbl">DATABASE ID</span>
  <input class="s-inp" type="text" id="saved-db" placeholder="32-character database ID" />
  <button class="save-btn" id="btn-save-settings">SAVE SETTINGS</button>
</div>

<div class="content" id="main-content">
  <div class="slbl">Platform</div>
  <div class="plat-grid" id="plat-grid">
    <button class="plat-btn active" data-platform="netflix">
      <span class="p-ico">NFLX</span><span class="p-name">Netflix</span>
    </button>
    <button class="plat-btn" data-platform="prime">
      <span class="p-ico">PRME</span><span class="p-name">Prime</span>
    </button>
    <button class="plat-btn" data-platform="hotstar">
      <span class="p-ico">HSTR</span><span class="p-name">Hotstar</span>
    </button>
    <button class="plat-btn" data-platform="disney">
      <span class="p-ico">D+</span><span class="p-name">Disney+</span>
    </button>
    <button class="plat-btn" data-platform="aniwatch">
      <span class="p-ico">AWC</span><span class="p-name">AniWatch</span>
    </button>
    <button class="plat-btn" data-platform="crunchyroll">
      <span class="p-ico">CR</span><span class="p-name">Crunchyroll</span>
    </button>
  </div>

  <div class="inst" id="inst-box"></div>
  <div class="err-box" id="err-box"></div>

  <button class="scan-btn" id="btn-scan">
    <span id="scan-icon">[■]</span>
    <span id="scan-text">SCAN CURRENT PAGE</span>
  </button>

  <div class="load" id="load">
    <div class="load-track"><div class="load-fill" id="load-fill"></div></div>
    <div class="load-msg" id="load-msg">initializing...</div>
  </div>

  <div class="results" id="results">
    <div class="stats">
      <div class="stat"><div class="stat-n w" id="sw">0</div><div class="stat-l">WATCHING</div></div>
      <div class="stat"><div class="stat-n p" id="sp">0</div><div class="stat-l">PLANNED</div></div>
      <div class="stat"><div class="stat-n c" id="sc">0</div><div class="stat-l">DONE</div></div>
    </div>
    <div class="list-hdr">
      <div class="slbl" style="margin-bottom:0;flex:1">Titles</div>
      <div class="tabs" id="tabs">
        <button class="tab active" data-tab="watching">WATCH</button>
        <button class="tab" data-tab="planned">PLAN</button>
        <button class="tab" data-tab="completed">DONE</button>
      </div>
    </div>
    <div class="anime-list" id="anime-list"></div>
    <div class="slbl">Export</div>
    <div class="exp-grid">
      <button class="exp-btn" id="btn-notion"><span class="e-ico">NTN</span><span class="e-lbl">Notion</span></button>
      <button class="exp-btn" id="btn-txt"><span class="e-ico">TXT</span><span class="e-lbl">Text</span></button>
      <button class="exp-btn" id="btn-csv"><span class="e-ico">CSV</span><span class="e-lbl">Sheet</span></button>
      <button class="exp-btn" id="btn-md"><span class="e-ico">#MD</span><span class="e-lbl">Markdown</span></button>
    </div>
  </div>
</div>

<div class="ftr">
  <span class="ftr-txt" id="ftr-txt">ready</span>
  <button class="clear-btn" id="btn-clear">clear data</button>
</div>

<div class="modal-bg" id="notion-modal">
  <div class="modal-win">
    <div class="win-bar">
      <span>NOTION_PUSH.EXE</span>
      <span class="win-x" id="btn-modal-close">✕</span>
    </div>
    <div class="win-body">
      <div class="win-sub">Need Integration Token + Database ID.<br><a href="https://www.notion.so/my-integrations" target="_blank">Create free integration →</a></div>
      <span class="win-lbl">INTEGRATION TOKEN</span>
      <input class="win-inp" type="password" id="notion-token" placeholder="secret_xxxxxxxxxxxx" />
      <span class="win-lbl">DATABASE ID</span>
      <input class="win-inp" type="text" id="notion-db" placeholder="32-character ID" />
      <div style="display:flex;align-items:center;gap:6px;margin-top:8px">
        <input type="checkbox" id="save-creds" style="accent-color:#00ff41">
        <label for="save-creds" style="font-size:11px;color:#444;cursor:pointer">Remember for next time</label>
      </div>
      <div class="win-actions">
        <button class="win-btn" id="btn-modal-cancel">CANCEL</button>
        <button class="win-btn ok" id="btn-push">PUSH &gt;&gt;</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="popup.js"></script>
</body>
</html>
